<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Launcher</title>
    <style>
      :root {
        --bg: rgba(245, 247, 251, 0.88);
        --card: rgba(255, 255, 255, 0.88);
        --text: #1f2937;
        --subtle: #6b7280;
        --primary: #0f766e;
        --primary-hover: #115e59;
        --line: #d1d5db;
        --success: #065f46;
        --error: #b91c1c;
        --selected: #d1fae5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        width: 100%;
        height: 100vh;
        padding: 20px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        height: calc(100vh - 72px);
        display: flex;
        flex-direction: column;
        padding: 14px;
        gap: 10px;
      }

      .search {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        outline: none;
      }

      .search:focus {
        border-color: var(--primary);
      }

      .status {
        font-size: 13px;
        color: var(--subtle);
      }

      .status.on {
        color: var(--success);
      }

      .list {
        flex: 1;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-right: 2px;
      }

      .item {
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 14px;
        font-weight: 600;
        text-align: left;
        cursor: pointer;
        background: #e5e7eb;
        color: var(--text);
      }

      .item.filter {
        background: var(--primary);
        color: #ffffff;
      }

      .item.filter:hover {
        background: var(--primary-hover);
      }

      .item.selected {
        outline: 2px solid #10b981;
        outline-offset: 1px;
        background: var(--selected);
      }

      .item.filter.selected {
        background: var(--primary-hover);
        outline: 2px solid #99f6e4;
      }

      .message {
        min-height: 20px;
        font-size: 13px;
      }

      .message.success {
        color: var(--success);
      }

      .message.error {
        color: var(--error);
      }

      .shortcut {
        font-size: 12px;
        color: var(--subtle);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>My Launcher</h1>
      <section class="panel">
        <input id="searchInput" class="search" type="text" placeholder="アプリ名で検索" autocomplete="off" />
        <div id="filterStatus" class="status off">プライバシーフィルター: OFF</div>
        <div id="itemsList" class="list"></div>
        <div id="message" class="message"></div>
        <div class="shortcut">表示切替: Ctrl + Space / Ctrl + Shift + Space, Esc: プライバシーフィルター解除</div>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
