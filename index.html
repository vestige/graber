<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>graber</title>
    <style>
      :root {
        --bg-top: #d7f5ee;
        --bg-bottom: #f2efe8;
        --card: rgba(255, 255, 255, 0.78);
        --card-border: rgba(15, 23, 42, 0.08);
        --text: #0f172a;
        --subtle: #475569;
        --primary: #0b766e;
        --primary-strong: #0a5d56;
        --line: rgba(15, 23, 42, 0.12);
        --success: #0f766e;
        --error: #b42318;
        --selected: rgba(10, 93, 86, 0.12);
        --shadow: 0 20px 50px rgba(2, 6, 23, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Bahnschrift", "Segoe UI Variable", "Yu Gothic UI", sans-serif;
        background: linear-gradient(150deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
        color: var(--text);
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        filter: blur(8px);
        pointer-events: none;
      }

      body::before {
        width: 360px;
        height: 360px;
        right: -120px;
        top: -80px;
        background: radial-gradient(circle at center, rgba(11, 118, 110, 0.24) 0%, rgba(11, 118, 110, 0) 70%);
      }

      body::after {
        width: 300px;
        height: 300px;
        left: -90px;
        bottom: -90px;
        background: radial-gradient(circle at center, rgba(30, 64, 175, 0.18) 0%, rgba(30, 64, 175, 0) 72%);
      }

      .container {
        width: 100%;
        height: 100vh;
        padding: 16px;
        animation: frame-in 260ms ease-out;
      }

      @keyframes frame-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 10px;
      }

      .title-wrap {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .title {
        margin: 0;
        font-size: 30px;
        line-height: 1;
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 0;
        font-size: 12px;
        color: var(--subtle);
      }

      .badge {
        border: 1px solid var(--card-border);
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 11px;
        font-weight: 700;
        color: var(--primary-strong);
        background: rgba(255, 255, 255, 0.7);
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--card-border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        border-radius: 16px;
        height: calc(100vh - 86px);
        display: flex;
        flex-direction: column;
        padding: 14px 14px 12px;
        gap: 11px;
      }

      .search-wrap {
        position: relative;
      }

      .search-wrap::before {
        content: "⌕";
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--subtle);
        font-size: 13px;
      }

      .search {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px 10px 30px;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.92);
        color: var(--text);
        outline: none;
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }

      .search:focus {
        border-color: var(--primary-strong);
        box-shadow: 0 0 0 3px rgba(11, 118, 110, 0.16);
      }

      .status {
        font-size: 13px;
        color: var(--subtle);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        border-radius: 999px;
        padding: 6px 10px;
      }

      .setting-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--subtle);
        padding: 6px 0 2px;
      }

      .setting-row input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }

      .status.on {
        color: var(--success);
        border-color: rgba(15, 118, 110, 0.3);
        background: rgba(15, 118, 110, 0.08);
      }

      .status.off {
        color: #a16207;
        border-color: rgba(161, 98, 7, 0.25);
        background: rgba(202, 138, 4, 0.08);
      }

      .filter-controls {
        display: flex;
        align-items: stretch;
        justify-content: space-between;
        gap: 8px;
      }

      .filter-toggle {
        border: none;
        border-radius: 10px;
        padding: 9px 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
        color: #ffffff;
        transition: transform 120ms ease, filter 120ms ease;
      }

      .filter-toggle:hover {
        filter: brightness(1.04);
      }

      .filter-toggle:active {
        transform: translateY(1px);
      }

      .list {
        flex: 1;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-right: 2px;
      }

      .item {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 600;
        text-align: left;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        transition: transform 100ms ease, border-color 100ms ease, background-color 100ms ease;
      }

      .item:hover {
        border-color: rgba(11, 118, 110, 0.45);
        transform: translateX(1px);
      }

      .item-title {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.35;
      }

      .item-meta {
        margin-top: 4px;
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
      }

      .chip {
        font-size: 11px;
        line-height: 1;
        padding: 4px 7px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--subtle);
        background: rgba(255, 255, 255, 0.78);
      }

      .chip.source-manual {
        color: #1e3a8a;
        border-color: rgba(30, 58, 138, 0.24);
        background: rgba(30, 58, 138, 0.08);
      }

      .chip.source-auto {
        color: #0f766e;
        border-color: rgba(15, 118, 110, 0.24);
        background: rgba(15, 118, 110, 0.09);
      }

      .chip.source-web {
        color: #7c3aed;
        border-color: rgba(124, 58, 237, 0.28);
        background: rgba(124, 58, 237, 0.1);
      }

      .chip.usage {
        color: #7c2d12;
        border-color: rgba(124, 45, 18, 0.24);
        background: rgba(124, 45, 18, 0.08);
      }

      .item.selected {
        border-color: rgba(10, 93, 86, 0.54);
        background: var(--selected);
        box-shadow: 0 0 0 2px rgba(11, 118, 110, 0.2);
      }

      .message {
        min-height: 21px;
        font-size: 13px;
        font-weight: 600;
        color: var(--subtle);
      }

      .message.success {
        color: var(--success);
      }

      .message.error {
        color: var(--error);
      }

      .shortcut {
        font-size: 12px;
        color: var(--subtle);
        opacity: 0.9;
      }

      .empty {
        font-size: 13px;
        color: var(--subtle);
        padding: 14px 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="panel-head">
        <div class="title-wrap">
          <h1 class="title">graber</h1>
          <p class="subtitle">launcher + privacy filter</p>
        </div>
        <div class="badge">v3</div>
      </div>
      <section class="panel">
        <div class="search-wrap">
          <input id="searchInput" class="search" type="text" placeholder="アプリ名で検索" autocomplete="off" />
        </div>
        <div class="filter-controls">
          <button id="filterToggleButton" class="filter-toggle" type="button">プライバシーフィルター ON/OFF</button>
          <div id="filterStatus" class="status off">プライバシーフィルター: OFF</div>
        </div>
        <label class="setting-row">
          <input id="autoLaunchCheckbox" type="checkbox" />
          <span>PC起動時に自動起動する</span>
        </label>
        <div id="itemsList" class="list"></div>
        <div id="message" class="message"></div>
        <div class="shortcut">表示切替: Ctrl + Space / Ctrl + Shift + Space, Esc: プライバシーフィルター解除</div>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
