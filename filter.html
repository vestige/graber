<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Filter</title>
    <style>
      :root {
        --filter-opacity: 0.70;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background: rgba(0, 0, 0, var(--filter-opacity));
      }
    </style>
  </head>
